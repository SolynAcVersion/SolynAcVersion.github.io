            --primary: #0000DE;
            --secondary: #0037da;
            --accent: #4a6fff;
            --dark: #f5f5f5;

            --text-light: #4a5568;
        }

        body {

            background: #f8f9fa;
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Gradient Background */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(0, 0, 222, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 55, 218, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(74, 111, 255, 0.03) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% {
                background:
                    radial-gradient(ellipse at 20% 20%, rgba(0, 0, 222, 0.05) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 80%, rgba(0, 55, 218, 0.04) 0%, transparent 50%),
                    radial-gradient(ellipse at 50% 50%, rgba(74, 111, 255, 0.03) 0%, transparent 50%);
            }
            50% {
                background:
                    radial-gradient(ellipse at 80% 20%, rgba(0, 55, 218, 0.04) 0%, transparent 50%),
                    radial-gradient(ellipse at 20% 80%, rgba(74, 111, 255, 0.035) 0%, transparent 50%),
                    radial-gradient(ellipse at 50% 50%, rgba(0, 0, 222, 0.035) 0%, transparent 50%);
            }
        }

        /* Canvas for particles */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 222, 0.1);
            border-radius: 24px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        /* Navigation Links */
        .nav-link {
            position: relative;
            padding: 12px 24px;
            color: var(--text-light);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 222, 0.08), rgba(0, 55, 218, 0.08));
            opacity: 0;
            transition: opacity 0.3s ease;

        .nav-link:hover {

            transform: translateX(8px);

        }

        .nav-link:hover::before {

        .nav-link i {

        }

        .nav-link span {

            z-index: 1;
        }

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Particle Animation System
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 80;
        const mouse = { x: null, y: null, radius: 150 };

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;

                // Mouse interaction
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        const directionX = dx / distance;
                        const directionY = dy / distance;
                        this.x -= directionX * force * 2;
                        this.y -= directionY * force * 2;
                    }
                }
            }

            draw() {
                ctx.fillStyle = `rgba(0, 0, 222, ${this.opacity * 0.6})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function connectParticles() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a + 1; b < particles.length; b++) {
                    const dx = particles[a].x - particles[b].x;
                    const dy = particles[a].y - particles[b].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 120) {
                        const opacity = (120 - distance) / 120 * 0.1;
                        ctx.strokeStyle = `rgba(0, 0, 222, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            connectParticles();
            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // GSAP Animations
        gsap.registerPlugin(ScrollTrigger);

        // Animate glass cards on load
        gsap.from('.glass-card', {
            duration: 1.2,
            y: 60,
            opacity: 0,
            ease: 'power3.out'
        });

        // Hover effect for tool cards
        document.querySelectorAll('.tool-card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                gsap.to(card, {
                    scale: 1.05,
                    duration: 0.3,
                    ease: 'power2.out'
                });
            });

            card.addEventListener('mouseleave', () => {
                gsap.to(card, {
                    scale: 1,
                    duration: 0.3,
                    ease: 'power2.out'
                });
            });
        });

        // Fetch Dog Image Function
        const fetchDogBtn = document.getElementById('fetchDogBtn');
        const dogImageContainer = document.getElementById('dogImageContainer');
        const dogImage = document.getElementById('dogImage');
        const dogInfo = document.getElementById('dogInfo');
        const COOLDOWN_TIME = 5;

        let isCooldown = false;
        let cooldownTimer = null;

        function startCooldown(button) {
            isCooldown = true;
            let remainingTime = COOLDOWN_TIME;

            button.classList.add('cooldown');
            button.disabled = true;

            const updateButtonText = () => {
                button.textContent = `请等待 ${remainingTime} 秒`;
            };

            updateButtonText();

            cooldownTimer = setInterval(() => {
                remainingTime--;
                if (remainingTime <= 0) {
                    clearInterval(cooldownTimer);
                    isCooldown = false;
                    button.classList.remove('cooldown');
                    button.disabled = false;
                    button.textContent = '获取狗狗图片';
                } else {
                    updateButtonText();
                }
            }, 1000);
        }

        fetchDogBtn.addEventListener('click', async () => {
            if (isCooldown) return;

            // Show loading state
            fetchDogBtn.innerHTML = '<div class="spinner"></div><span>加载中...</span>';
            fetchDogBtn.disabled = true;

            try {
                // Call random.dog API
                const response = await fetch('https://random.dog/woof.json');

                if (!response.ok) {
                    throw new Error('API 请求失败');
                }

                const data = await response.json();

                // Show container with animation
                dogImageContainer.classList.add('active');

                // Load image and wait for it to complete
                dogImage.onload = () => {
                    // Animate the image appearance
                    gsap.fromTo(dogImage,
                        { opacity: 0, scale: 0.8 },
                        { opacity: 1, scale: 1, duration: 0.6, ease: 'back.out(1.7)' }
                    );

                    // Update info
                    const fileSize = data.fileSizeBytes ? (data.fileSizeBytes / 1024 / 1024).toFixed(2) + ' MB' : '未知大小';
                    dogInfo.innerHTML = `图片大小: ${fileSize}`;

                    // Start cooldown after image is loaded
                    fetchDogBtn.textContent = '获取狗狗图片';
                    startCooldown(fetchDogBtn);
                };

                dogImage.onerror = () => {
                    throw new Error('图片加载失败');
                };

                // Update image with cache-busting parameter
                const cacheBuster = new Date().getTime();
                dogImage.src = data.url + '?t=' + cacheBuster;

            } catch (error) {
                console.error('获取狗狗图片失败:', error);
                alert('获取图片失败,请稍后重试 (汪！)');

                // Reset button state on error
                fetchDogBtn.textContent = '获取狗狗图片';
                fetchDogBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
