body {
  overflow-x: hidden;
  word-wrap: break-word;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #0000DE;
  --secondary: #0037da;
  --accent: #A00000;
  --bg-light: #EEEEEE;
  --bg-cream: #fffdfc;
  --text-dark: #000000;
  --border-dark: #600000;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg-light);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
}

.crt-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    rgba(0, 0, 0, 0.1),
    rgba(0, 0, 0, 0.1) 1px,
    transparent 1px,
    transparent 2px
  );
  z-index: 9999;
  opacity: 0.25;
}

.main-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  animation: slideIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

@keyframes slideIn {
  0% {
    opacity: 0;
    transform: translateY(-50px) scale(0.9);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.header {
  background: var(--bg-cream);
  border: 3px solid var(--border-dark);
  padding: 30px;
  text-align: center;
  margin-bottom: 20px;
  animation: headerPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
}

@keyframes headerPop {
  0% {
    opacity: 0;
    transform: scale(0.5) rotate(-3deg);
  }
  100% {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }
}

.cat-ascii {
  font-size: 14px;
  color: var(--accent);
  font-weight: bold;
  margin-bottom: 15px;
  white-space: pre;
  animation: bounce 2s ease-in-out infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.header h1 {
  font-size: 2.5rem;
  color: #0000F0;
  margin-bottom: 10px;
  text-shadow: 2px 2px 0 rgba(0, 0, 222, 0.2);
}

.header h1 span {
  display: inline-block;
  animation: wave 2s ease-in-out infinite;
}

@keyframes wave {
  0%, 100% {
    transform: translateY(0px);
  }
  50% {
    transform: translateY(-15px);
  }
}

.header p {
  font-size: 1.1rem;
  color: var(--accent);
}

.content-layout {
  display: grid;
  grid-template-columns: 250px 1fr;
  gap: 20px;
}

.sidebar {
  background: var(--primary);
  border: 3px solid var(--border-dark);
  padding: 20px;
  color: #fff;
  animation: slideInLeft 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.4s both;
  position: relative;
  overflow: visible;
}

.sidebar-cat {
  display: inline-block;
  font-size: 14px;
  line-height: 1;
  z-index: 100;
  transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  cursor: pointer;
  flex-shrink: 0;
}

.sidebar-cat .cat-body {
  position: relative;
  display: inline-block;
}

.sidebar-cat .cat-face {
  font-size: 20px;
  color: #FFFFFF;
  font-weight: bold;
}

.sidebar-cat .cat-bubbles {
  position: absolute;
  top: -25px;
  right: 0;
  font-size: 14px;
  opacity: 0;
  color: #FFFFFF;
}

.sidebar-cat .cat-zzz {
  position: absolute;
  top: -30px;
  right: 5px;
  font-size: 12px;
  opacity: 0;
  color: #FFFFFF;
  font-weight: bold;
}

.sidebar-cat .cat-heart {
  position: absolute;
  top: -22px;
  right: -10px;
  font-size: 12px;
  opacity: 0;
  color: #FFFFFF;
}

.sidebar-cat:hover {
  transform: scale(1.1);
}

.sidebar-cat:active {
  transform: scale(0.95);
}

.sidebar-cat.sleeping .cat-bubbles {
  animation: bubbles 2s ease-in-out 3;
}

.sidebar-cat.sleeping .cat-face {
  animation: sleeping 1s ease-in-out 6;
}

.sidebar-cat.snoring .cat-zzz {
  animation: zzz 2s ease-in-out 3;
}

.sidebar-cat.loving .cat-heart {
  animation: heartFloat 1.5s ease-in-out 4;
}

.sidebar-cat.blinking .cat-face {
  animation: blink 3s ease-in-out 2;
}

.sidebar-cat.stretching .cat-body {
  animation: stretch 0.5s ease-in-out 2;
}

.sidebar-cat.jumping .cat-body {
  animation: jump 0.8s ease-in-out 5;
}

.sidebar-cat.spinning .cat-body {
  animation: spin 1s ease-in-out 4;
}

.sidebar-cat.shaking .cat-body {
  animation: shake 0.5s ease-in-out 6;
}

.sidebar-cat.bouncing .cat-body {
  animation: bounce 0.6s ease-in-out 5;
}

.sidebar-cat.dancing .cat-body {
  animation: dance 1s ease-in-out 4;
}

@keyframes bubbles {
  0%, 100% {
    opacity: 0;
    transform: translateY(0) scale(0.5);
  }
  50% {
    opacity: 1;
    transform: translateY(-10px) scale(1);
  }
}

@keyframes sleeping {
  0%, 100% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.1);
  }
}

@keyframes zzz {
  0% {
    opacity: 0;
    transform: translateY(0) translateX(0);
  }
  50% {
    opacity: 1;
    transform: translateY(-15px) translateX(5px);
  }
  100% {
    opacity: 0;
    transform: translateY(-25px) translateX(10px);
  }
}

@keyframes heartFloat {
  0%, 100% {
    opacity: 0;
    transform: translateY(0) scale(0.5);
  }
  50% {
    opacity: 1;
    transform: translateY(-15px) scale(1.2);
  }
}

@keyframes blink {
  0%, 45%, 55%, 100% {
    transform: scaleY(1);
  }
  50% {
    transform: scaleY(0.1);
  }
}

@keyframes stretch {
  0%, 100% {
    transform: scaleX(1);
  }
  50% {
    transform: scaleX(1.2);
  }
}

@keyframes jump {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-20px);
  }
}

@keyframes spin {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}

@keyframes shake {
  0%, 100% {
    transform: translateX(0);
  }
  25% {
    transform: translateX(-10px) rotate(-5deg);
  }
  75% {
    transform: translateX(10px) rotate(5deg);
  }
}

@keyframes bounce {
  0%, 100% {
    transform: translateY(0) scale(1, 1);
  }
  50% {
    transform: translateY(-15px) scale(0.9, 1.1);
  }
}

@keyframes dance {
  0%, 100% {
    transform: translateX(0) rotate(0deg);
  }
  25% {
    transform: translateX(-5px) rotate(-10deg);
  }
  50% {
    transform: translateX(5px) rotate(10deg);
  }
  75% {
    transform: translateX(-5px) rotate(-5deg);
  }
}

@keyframes slideInLeft {
  0% {
    opacity: 0;
    transform: translateX(-100px) rotate(-5deg);
  }
  100% {
    opacity: 1;
    transform: translateX(0) rotate(0deg);
  }
}

<script>
// 小猫随机动作
const sidebarCat = document.getElementById('sidebarCat');
const catActions = ['sleeping', 'snoring', 'loving', 'blinking', 'stretching', 'jumping', 'spinning', 'shaking', 'bouncing', 'dancing', ''];
let currentAction = '';
let animationTimeout = null;

function setRandomCatAction() {
  if (currentAction) {
    sidebarCat.classList.remove(currentAction);
  }

  const randomIndex = Math.floor(Math.random() * catActions.length);
  currentAction = catActions[randomIndex];

  if (currentAction) {
    sidebarCat.classList.add(currentAction);

    let animationDuration = 6000;

    if (animationTimeout) {
      clearTimeout(animationTimeout);
    }
    animationTimeout = setTimeout(() => {
      setRandomCatAction();
    }, animationDuration);
  } else {
    animationTimeout = setTimeout(() => {
      setRandomCatAction();
    }, 1000);
  }
}

function triggerCatAction() {
  if (animationTimeout) {
    clearTimeout(animationTimeout);
    animationTimeout = null;
  }

  if (currentAction) {
    sidebarCat.classList.remove(currentAction);
    currentAction = '';
  }

  const nonEmptyActions = catActions.filter(a => a !== '');
  const randomIndex = Math.floor(Math.random() * nonEmptyActions.length);
  currentAction = nonEmptyActions[randomIndex];
  sidebarCat.classList.add(currentAction);

  animationTimeout = setTimeout(() => {
    setRandomCatAction();
  }, 6000);
}

sidebarCat.addEventListener('click', triggerCatAction);
setTimeout(setRandomCatAction, 2000);
